<style>

    --green: #00b894;
    --orange: #fdcb6e;
    --blue: #0984e3;
    --purple: #6c5ce7;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, var(--red) 0%, #c0392b 100%);

    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(230,0,18,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 28px; font-weight: 900; letter-spacing: 3px; }

    background: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    border-bottom: 1px solid #eee;
    box-shadow: var(--shadow);

  .control-group { display: flex; align-items: center; gap: 8px; }
  .control-group label { font-size: 13px; font-weight: 600; color: var(--text-light); }
  select, input[type="date"] {
    padding: 8px 14px;

    outline: none;

  select:focus, input[type="date"]:focus { border-color: var(--red); }
  .btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary { background: var(--red); color: white; }
  .btn-primary:hover { background: #c0392b; transform: translateY(-1px); }
  .btn-outline { background: white; color: var(--red); border: 2px solid var(--red); }
  .btn-outline:hover { background: #fff5f5; }
  .quick-btns { display: flex; gap: 6px; }
  .quick-btn {
    padding: 6px 12px;

    border-radius: 6px;
    background: white;
    font-size: 12px;

    font-family: inherit;

  .kpi-card:nth-child(3)::before { background: var(--purple); }
  .kpi-card:nth-child(4)::before { background: var(--green); }

function dateToIndex(dateStr) {
  const d = new Date(dateStr);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  let dayOfYear = Math.floor((d - jan1) / 86400000);
  if (d.getMonth() >= 2) { return dayOfYear + 3; }
  return dayOfYear;
}

function indexToDate2026(idx) {
  if (idx <= 58) { const d = new Date(2026, 0, 1); d.setDate(d.getDate() + idx); return d; }
  if (idx >= 59 && idx <= 61) return null;
  const d = new Date(2026, 2, 1); d.setDate(d.getDate() + (idx - 62)); return d;
}

function formatDate(d) { return (d.getMonth()+1) + '/' + d.getDate(); }
function formatMoney(n) { if (n == null) return '-'; return 'NT$' + Math.round(n).toLocaleString(); }
function pctChange(curr, prev) { if (!prev || prev === 0) return null; return ((curr - prev) / prev * 100); }

function getDataRange(storeKey, yearKey, fromIdx, toIdx) {
  const arr = RAW[storeKey][yearKey];
  let sum = 0, count = 0, max = -Infinity, min = Infinity;
  const values = [];
  for (let i = fromIdx; i <= toIdx && i < arr.length; i++) {
    const v = arr[i];
    if (v !== null && v !== undefined) { sum += v; count++; if (v > max) max = v; if (v < min) min = v; values.push(v); }
  }
  return { sum, count, avg: count ? sum/count : 0, max: max === -Infinity ? 0 : max, min: min === Infinity ? 0 : min, values };
}

let trendChart, pieChart, compareChart;

function updateDashboard() {
  const fromStr = document.getElementById('dateFrom').value;
  const toStr = document.getElementById('dateTo').value;
  const compareMode = document.getElementById('compareMode').value;
  const fromIdx = dateToIndex(fromStr);
  const toIdx = dateToIndex(toStr);
  const wowFromIdx = fromIdx - 7;
  const wowToIdx = toIdx - 7;
  const kpiGrid = document.getElementById('kpiGrid');
  kpiGrid.innerHTML = '';
  const storeStats = [];

  STORE_NAMES.forEach((store, si) => {
    const curr = getDataRange(store, 'y26', fromIdx, toIdx);
    const yoy = getDataRange(store, 'y25', fromIdx, toIdx);
    const wow = getDataRange(store, 'y26', wowFromIdx, wowToIdx);
    const yoyPct = pctChange(curr.sum, yoy.sum);
    const wowPct = pctChange(curr.sum, wow.sum);
    storeStats.push({ store, curr, yoy, wow, yoyPct, wowPct });
    const card = document.createElement('div');
    card.className = 'kpi-card';
    card.innerHTML = `
      <div class="kpi-store"><span class="dot"></span>${store}</div>
      <div class="kpi-value">${formatMoney(curr.sum)}</div>
      <div class="kpi-sub">期間營收 ｜ 日均 ${formatMoney(curr.avg)}</div>
      <div class="kpi-compare">
        <span class="kpi-badge ${yoyPct >= 0 ? 'up' : 'down'}">

        </span>
        <span class="kpi-badge ${wowPct >= 0 ? 'up' : 'down'}">
          WoW ${wowPct !== null ? (wowPct >= 0 ? '+' : '') + wowPct.toFixed(1) + '%' : 'N/A'}

    kpiGrid.appendChild(card);
  });

  renderPieChart(storeStats);
  renderCompareChart(storeStats);
  renderDetailTable(storeStats);
  renderAISuggestions(storeStats);
}
function renderTrendChart(fromIdx, toIdx) {
  const labels = [];
  const datasets = [];
  for (let i = fromIdx; i <= toIdx; i++) { const d = indexToDate2026(i); if (d) labels.push(formatDate(d)); }
  STORE_NAMES.forEach((store, si) => {
    const data = [];
    for (let i = fromIdx; i <= toIdx; i++) { const d = indexToDate2026(i); if (d) { const v = RAW[store].y26[i]; data.push(v !== null ? v : null); } }
    datasets.push({ label: store, data, borderColor: STORE_COLORS[si], backgroundColor: STORE_COLORS[si] + '20', borderWidth: 2, pointRadius: labels.length > 40 ? 0 : 3, tension: 0.3, fill: false });
  });
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line', data: { labels, datasets },
    options: { responsive: true, interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + formatMoney(ctx.raw) } } },
      scales: { y: { ticks: { callback: v => 'NT$' + (v/1000).toFixed(0) + 'K' } } } }
  });
}

function renderPieChart(storeStats) {
  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels: storeStats.map(s => s.store), datasets: [{ data: storeStats.map(s => s.curr.sum), backgroundColor: STORE_COLORS, borderWidth: 3, borderColor: '#fff' }] },
    options: { responsive: true, plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: ctx => { const total = ctx.dataset.data.reduce((a,b) => a+b, 0); const pct = (ctx.raw / total * 100).toFixed(1); return ctx.label + ': ' + formatMoney(ctx.raw) + ' (' + pct + '%)'; } } } } }
  });
}

function renderCompareChart(storeStats) {
  if (compareChart) compareChart.destroy();
  compareChart = new Chart(document.getElementById('compareChart'), {
    type: 'bar',
    data: { labels: storeStats.map(s => s.store), datasets: [
      { label: '2026（本期）', data: storeStats.map(s => s.curr.sum), backgroundColor: '#E60012cc', borderRadius: 6 },
      { label: '2025（去年同期）', data: storeStats.map(s => s.yoy.sum), backgroundColor: '#bdc3c7cc', borderRadius: 6 }
    ] },
    options: { responsive: true, plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + formatMoney(ctx.raw) } } },
      scales: { y: { ticks: { callback: v => 'NT$' + (v/1000).toFixed(0) + 'K' } } } }
  });
}

function renderDetailTable(storeStats) {
  const tbody = document.getElementById('detailBody');
  tbody.innerHTML = '';
  storeStats.forEach(s => {
    const yoyClass = s.yoyPct >= 0 ? 'trend-up' : 'trend-down';
    const wowClass = s.wowPct >= 0 ? 'trend-up' : 'trend-down';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${s.store}</td><td>${formatMoney(s.curr.sum)}</td><td>${formatMoney(s.curr.avg)}</td><td>${formatMoney(s.yoy.sum)}</td><td class="${yoyClass}">${s.yoyPct !== null ? (s.yoyPct >= 0 ? '▲' : '▼') + Math.abs(s.yoyPct).toFixed(1) + '%' : 'N/A'}</td><td>${formatMoney(s.wow.sum)}</td><td class="${wowClass}">${s.wowPct !== null ? (s.wowPct >= 0 ? '▲' : '▼') + Math.abs(s.wowPct).toFixed(1) + '%' : 'N/A'}</td><td>${formatMoney(s.curr.max)}</td><td>${formatMoney(s.curr.min)}</td>`;
    tbody.appendChild(tr);
  });
}
function renderAISuggestions(storeStats) {
  const ul = document.getElementById('aiSuggestions');
  const suggestions = generateAISuggestions(storeStats);
  ul.innerHTML = suggestions.map(s => '<li>' + s + '</li>').join('');
}

function generateAISuggestions(storeStats) {
  const tips = [];
  const sortedYoY = [...storeStats].sort((a,b) => (b.yoyPct||0) - (a.yoyPct||0));
  const best = sortedYoY[0];
  const worst = sortedYoY[sortedYoY.length - 1];
  if (best.yoyPct > 0) {
    tips.push('<strong>🏆 ' + best.store + '</strong> 年增率 <strong>+' + best.yoyPct.toFixed(1) + '%</strong>，表現最佳！建議研究其成功因素並複製至其他門市。');
  }
  if (worst.yoyPct < 0) {
    tips.push('<strong>⚠️ ' + worst.store + '</strong> 年增率 <strong>' + worst.yoyPct.toFixed(1) + '%</strong>，需特別關注。建議檢視商品組合、陳列與客流量變化，找出下滑原因。');
  }
  const wowDown = storeStats.filter(s => s.wowPct < -10);
  if (wowDown.length > 0) {
    tips.push('<strong>📉 週環比警示：</strong>' + wowDown.map(s => s.store).join('、') + ' 較上週下滑超過 10%，建議本週加強促銷活動或調整人力配置。');
  }
  const total = storeStats.reduce((a,s) => a + s.curr.sum, 0);
  const shares = storeStats.map(s => ({store: s.store, pct: s.curr.sum / total * 100}));
  const maxShare = shares.sort((a,b) => b.pct - a.pct)[0];
  if (maxShare.pct > 35) {
    tips.push('<strong>🎯 營收集中度：</strong>' + maxShare.store + ' 佔比達 ' + maxShare.pct.toFixed(1) + '%，建議分散風險，提升其他門市坪效。');
  }
  const avgAll = storeStats.map(s => ({store: s.store, avg: s.curr.avg})).sort((a,b) => b.avg - a.avg);
  tips.push('<strong>💰 日均營收排名：</strong>' + avgAll.map((s,i) => (i+1) + '. ' + s.store + '（' + formatMoney(s.avg) + '）').join(' → ') + '。低排名門市應檢討客單價與來客數。');
  storeStats.forEach(s => {
    if (s.curr.max > s.curr.avg * 3) {
      tips.push('<strong>📊 ' + s.store + '</strong> 最高日營收（' + formatMoney(s.curr.max) + '）遠超日均值，可能有特殊活動或彌月大單。建議追蹤異常值成因以利未來規劃。');
    }
  });
  return tips;
}
function sendChat() {
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q) return;
  const messages = document.getElementById('chatMessages');
  messages.innerHTML += '<div class="ai-msg user"><div class="ai-avatar">👤</div><div class="bubble">' + q + '</div></div>';
  input.value = '';
  setTimeout(() => {
    const answer = generateAIAnswer(q);
    messages.innerHTML += '<div class="ai-msg ai"><div class="ai-avatar">🤖</div><div class="bubble">' + answer + '</div></div>';
    messages.scrollTop = messages.scrollHeight;
  }, 500);
}

function generateAIAnswer(question) {
  const fromStr = document.getElementById('dateFrom').value;
  const toStr = document.getElementById('dateTo').value;
  const fromIdx = dateToIndex(fromStr);
  const toIdx = dateToIndex(toStr);
  const stats = {};
  STORE_NAMES.forEach(store => {
    const curr = getDataRange(store, 'y26', fromIdx, toIdx);
    const yoy = getDataRange(store, 'y25', fromIdx, toIdx);
    const wow = getDataRange(store, 'y26', fromIdx - 7, toIdx - 7);
    stats[store] = { curr, yoy, wow, yoyPct: pctChange(curr.sum, yoy.sum), wowPct: pctChange(curr.sum, wow.sum) };
  });
  const q = question.toLowerCase();

  for (const store of STORE_NAMES) {
    if (q.includes(store.toLowerCase()) || q.includes(store)) {
      const s = stats[store];
      return '<strong>' + store + '</strong> 在選定期間的數據如下：<br>' +
        '・期間營收：' + formatMoney(s.curr.sum) + '<br>' +
        '・日均營收：' + formatMoney(s.curr.avg) + '<br>' +
        '・vs 去年同期：' + (s.yoyPct !== null ? (s.yoyPct >= 0 ? '+' : '') + s.yoyPct.toFixed(1) + '%' : 'N/A') + '<br>' +
        '・vs 上週：' + (s.wowPct !== null ? (s.wowPct >= 0 ? '+' : '') + s.wowPct.toFixed(1) + '%' : 'N/A') + '<br>' +
        '・最高日營收：' + formatMoney(s.curr.max) + '<br>' +
        '・最低日營收：' + formatMoney(s.curr.min);
    }
  }

  if (q.includes('排名') || q.includes('最好') || q.includes('最高') || q.includes('第一')) {
    const sorted = STORE_NAMES.map(s => ({name: s, sum: stats[s].curr.sum})).sort((a,b) => b.sum - a.sum);
    return '期間營收排名：<br>' + sorted.map((s,i) => (i+1) + '. ' + s.name + '：' + formatMoney(s.sum)).join('<br>');
  }

  if (q.includes('成長') || q.includes('增長') || q.includes('yoy') || q.includes('去年')) {
    const sorted = STORE_NAMES.map(s => ({name: s, pct: stats[s].yoyPct})).sort((a,b) => (b.pct||0) - (a.pct||0));
    return '年增率排名（vs 去年同期）：<br>' + sorted.map((s,i) => (i+1) + '. ' + s.name + '：' + (s.pct !== null ? (s.pct >= 0 ? '+' : '') + s.pct.toFixed(1) + '%' : 'N/A')).join('<br>');
  }

  if (q.includes('上週') || q.includes('wow') || q.includes('週')) {
    const sorted = STORE_NAMES.map(s => ({name: s, pct: stats[s].wowPct})).sort((a,b) => (b.pct||0) - (a.pct||0));
    return '週環比排名（vs 上週同期）：<br>' + sorted.map((s,i) => (i+1) + '. ' + s.name + '：' + (s.pct !== null ? (s.pct >= 0 ? '+' : '') + s.pct.toFixed(1) + '%' : 'N/A')).join('<br>');
  }
  if (q.includes('建議') || q.includes('怎麼辦') || q.includes('策略')) {
    const worst = STORE_NAMES.map(s => ({name: s, pct: stats[s].yoyPct})).sort((a,b) => (a.pct||0) - (b.pct||0))[0];
    return '根據數據分析，建議優先關注 <strong>' + worst.name + '</strong>（年增率最低），可考慮：<br>' +
      '1. 檢視來客數變化，評估是否需要調整行銷策略<br>' +
      '2. 分析客單價趨勢，考慮搭配組合優惠提升單筆消費<br>' +
      '3. 對比其他門市的暢銷品類，評估商品陳列調整空間<br>' +
      '4. 檢查週邊競品動態，是否有新開店或大促活動影響';
  }

  if (q.includes('總營收') || q.includes('四店') || q.includes('全部')) {
    const total = STORE_NAMES.reduce((sum, s) => sum + stats[s].curr.sum, 0);
    const totalYoy = STORE_NAMES.reduce((sum, s) => sum + stats[s].yoy.sum, 0);
    const totalPct = pctChange(total, totalYoy);
    return '四店合計期間營收：<strong>' + formatMoney(total) + '</strong><br>' +
      '去年同期：' + formatMoney(totalYoy) + '<br>' +
      '年增率：' + (totalPct !== null ? (totalPct >= 0 ? '+' : '') + totalPct.toFixed(1) + '%' : 'N/A');
  }

  return '根據目前選定期間的數據：<br>' +
    '・四店合計營收：' + formatMoney(STORE_NAMES.reduce((s, st) => s + stats[st].curr.sum, 0)) + '<br>' +
    '・營收最高門市：' + STORE_NAMES.reduce((best, s) => stats[s].curr.sum > stats[best].curr.sum ? s : best, STORE_NAMES[0]) + '<br>' +
    '・年增率最佳：' + STORE_NAMES.reduce((best, s) => (stats[s].yoyPct||0) > (stats[best].yoyPct||0) ? s : best, STORE_NAMES[0]) + '<br><br>' +
    '您可以試著問更具體的問題，例如：「京站本月表現如何？」「哪家店年增率最高？」「給我經營建議」';
}

document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const range = this.dataset.range;
    const today = new Date(2026, 2, 22);
    let from;
    if (range === '7') { from = new Date(today); from.setDate(from.getDate() - 6); }
    else if (range === '30') { from = new Date(today); from.setDate(from.getDate() - 29); }
    else if (range === 'mtd') { from = new Date(2026, 2, 1); }
    else if (range === 'ytd') { from = new Date(2026, 0, 1); }
    document.getElementById('dateFrom').value = from.toISOString().split('T')[0];
    document.getElementById('dateTo').value = today.toISOString().split('T')[0];
    updateDashboard();
  });
});

updateDashboard();
